<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  
  <title>Frontend Mentor | Blog preview card</title>
</head>
<body>
  <div class="card">
    <div class="image-container">
      <img src="./assets/images/illustration-article.svg" alt="illustration-article">
    </div>

    <div class="content">
      <div class="tag">Learning</div>
      <div class="date">Published 21 Dec 2023</div>
      
      <h2>HTML & CSS foundations</h2>
      
      <p class="description">
        These languages are the backbone of every website, defining structure, content, and presentation.
      </p>

      <div class="meta">
        <div class="author-img">
          <img src="./assets/images/image-avatar.webp"
          width="50px" alt="image-avatar">
        </div>
        <div class="author-info">
          <div class="author-name">Greg Hooper</div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
